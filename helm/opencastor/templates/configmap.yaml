apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opencastor.fullname" . }}-config
  labels:
    {{- include "opencastor.labels" . | nindent 4 }}
data:
  robot.rcan.yaml: |
    {{- if .Values.robot.config }}
    {{- .Values.robot.config | nindent 4 }}
    {{- else }}
    rcan_version: "3.0"
    metadata:
      robot_name: {{ .Values.robot.name | quote }}
    agent:
      provider: {{ .Values.config.provider | quote }}
      {{- if .Values.config.model }}
      model: {{ .Values.config.model | quote }}
      {{- end }}
    drivers:
      - id: mock
        protocol: simulation
    {{- end }}
