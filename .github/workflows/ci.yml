name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Test (Python ${{ matrix.python-version }})"
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check castor/

      - name: Check formatting
        run: ruff format --check castor/

      - name: Validate RCAN configs
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir config/presets
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir tests/fixtures

      - name: Check setup docs sync
        run: python scripts/sync_setup_docs.py --check

      - name: Run tests with coverage
        # TODO: raise threshold as hardware driver test coverage improves (43 new modules added Mar 14)
        run: pytest tests/ -q --cov=castor --cov-report=term-missing --cov-fail-under=20
