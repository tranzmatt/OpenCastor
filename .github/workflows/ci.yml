name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Test (Python ${{ matrix.python-version }})"
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check castor/

      - name: Check formatting
        run: ruff format --check castor/

      - name: Validate RCAN configs
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir .

      - name: Run tests with coverage
        run: pytest tests/ -q --cov=castor --cov-report=term-missing --cov-fail-under=30
