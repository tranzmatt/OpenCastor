# Release workflow for OpenCastor
#
# Triggers on version tags (v*). Runs tests, creates a GitHub Release,
# and publishes to PyPI using Trusted Publishing (OIDC).
#
# PyPI Trusted Publisher Setup:
#   1. Go to https://pypi.org/manage/project/opencastor/settings/publishing/
#   2. Add a new GitHub publisher:
#      - Owner: craigm26
#      - Repository: OpenCastor
#      - Workflow name: release.yml
#      - Environment name: pypi
#   3. Save. No API token needed after this.
#
# The publish job tries OIDC first, then falls back to PYPI_API_TOKEN secret.

name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel in-progress runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    name: "Gate: main CI must be green"
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for CI to complete
        run: |
          echo 'Waiting for CI to pass on ${{ github.sha }}...'
          for i in $(seq 1 30); do
            STATUS=$(gh run list --repo ${{ github.repository }} --workflow ci.yml --commit ${{ github.sha }} --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo 'pending')
            echo "Attempt $i: CI status = $STATUS"
            if [ "$STATUS" = 'success' ]; then echo 'CI passed!'; exit 0; fi
            if [ "$STATUS" = 'failure' ] || [ "$STATUS" = 'cancelled' ]; then echo 'CI failed!'; exit 1; fi
            sleep 20
          done
          echo 'Timeout waiting for CI'; exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify tag commit is on main and CI passed
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const ref = context.ref;
            core.info(`Validating release gate for ${ref} @ ${sha}`);

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `main...${sha}`,
            });
            const status = compare.data.status;
            if (!["behind", "identical"].includes(status)) {
              core.setFailed(
                `Tag commit ${sha} is not on main history (compare status: ${status}).`
              );
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              head_sha: sha,
              status: "completed",
              per_page: 20,
            });
            const successfulRun = runs.data.workflow_runs.find(
              (r) => r.conclusion === "success"
            );
            if (!successfulRun) {
              core.setFailed(
                `No successful ci.yml run found for ${sha}. Wait for CI on main to pass, then push the tag.`
              );
              return;
            }

            core.info(
              `Gate passed with CI run #${successfulRun.run_number}: ${successfulRun.html_url}`
            );

  test:
    needs: gate
    runs-on: ubuntu-latest
    name: "Test (Python ${{ matrix.python-version }})"
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check castor/

      - name: Check formatting
        run: ruff format --check castor/

      - name: Validate RCAN configs
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir .

      - name: Run tests with coverage
        run: pytest tests/ -q --cov=castor --cov-report=term-missing --cov-fail-under=30

  release:
    needs: test
    runs-on: ubuntu-latest
    name: "Create Release"
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag version matches pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])" 2>/dev/null || \
                              python3 -c "import re; s=open('pyproject.toml').read(); print(re.search(r'version\s*=\s*\"([^\"]+)\"', s).group(1))")
          echo "Tag version:       $TAG_VERSION"
          echo "pyproject version: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch! Tag is v$TAG_VERSION but pyproject.toml has $PYPROJECT_VERSION."
            echo "::error::Bump the version in pyproject.toml and castor/__init__.py to $TAG_VERSION, commit, then re-push the tag."
            exit 1
          fi
          echo "✅ Versions match: $TAG_VERSION"

      - name: Sync version across all touchpoints
        run: |
          python scripts/sync-version.py ${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "chore: sync version touchpoints to v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main || true

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag (or all if first release)
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "COMMITS<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "OpenCastor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## OpenCastor v${{ steps.version.outputs.VERSION }}

            ### Commits
            ```
            ${{ steps.notes.outputs.COMMITS }}
            ```

            ### Install
            ```bash
            curl -sL opencastor.com/install | bash
            ```

            Or with pip:
            ```bash
            pip install opencastor==${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: continuonai/rcan-spec/.github/actions/emit-version-tuple@v3.2.0
        with:
          project: opencastor
          ran: ${{ secrets.OPENCASTOR_RELEASE_RAN }}
          field: runtime_version
          value: ${{ steps.version.outputs.VERSION }}
          depends_on: '{"protocol_version":">=3.2.0","manifest_spec_version":">=1.5.0","gateway_version":">=0.2.0"}'
          pq_signing_key: ${{ secrets.OPENCASTOR_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.OPENCASTOR_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.OPENCASTOR_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.OPENCASTOR_RELEASE_KID }}
          release_tag: ${{ github.ref_name }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    name: "Publish to PyPI (OIDC)"
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Generate SBOM (CycloneDX)
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: python3 .github/scripts/generate_sbom.py
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          files: opencastor-${{ github.ref_name }}-sbom.cyclonedx.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sbom/ directory
        run: |
          mkdir -p sbom
          cp opencastor-${{ github.ref_name }}-sbom.cyclonedx.json sbom/opencastor-latest-sbom.cyclonedx.json 2>/dev/null || true
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add sbom/
          git diff --staged --quiet || git commit -m "chore(sbom): update SBOM for ${{ github.ref_name }}"
          git push origin HEAD:main || true

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        id: publish_oidc
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        continue-on-error: true
        with:
          skip-existing: true

      - name: Publish to PyPI (API token fallback)
        if: steps.publish_oidc.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish mode summary
        if: always()
        run: |
          if [ "${{ steps.publish_oidc.outcome }}" = "success" ]; then
            echo "### PyPI publish mode: Trusted Publisher (OIDC)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### PyPI publish mode: API token fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "OIDC trusted publishing failed for this run. Configure a matching trusted publisher at:" >> "$GITHUB_STEP_SUMMARY"
            echo "https://pypi.org/manage/project/opencastor/settings/publishing/?provider=github&owner=craigm26&repository=OpenCastor&workflow_filename=release.yml" >> "$GITHUB_STEP_SUMMARY"
          fi
