# Release workflow for OpenCastor
#
# Triggers on version tags (v*). Runs tests, creates a GitHub Release,
# and publishes to PyPI using Trusted Publishing (OIDC).
#
# PyPI Trusted Publisher Setup:
#   1. Go to https://pypi.org/manage/project/opencastor/settings/publishing/
#   2. Add a new GitHub publisher:
#      - Owner: craigm26
#      - Repository: OpenCastor
#      - Workflow name: release.yml
#      - Environment name: pypi
#   3. Save. No API token needed after this.
#
# The publish job tries OIDC first, then falls back to PYPI_API_TOKEN secret.

name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel in-progress runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    name: "Gate: main CI must be green"
    permissions:
      actions: read
      contents: read
    steps:
      - name: Verify tag commit is on main and CI passed
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const ref = context.ref;
            core.info(`Validating release gate for ${ref} @ ${sha}`);

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `main...${sha}`,
            });
            const status = compare.data.status;
            if (!["behind", "identical"].includes(status)) {
              core.setFailed(
                `Tag commit ${sha} is not on main history (compare status: ${status}).`
              );
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              head_sha: sha,
              status: "completed",
              per_page: 20,
            });
            const successfulRun = runs.data.workflow_runs.find(
              (r) => r.conclusion === "success"
            );
            if (!successfulRun) {
              core.setFailed(
                `No successful ci.yml run found for ${sha}. Wait for CI on main to pass, then push the tag.`
              );
              return;
            }

            core.info(
              `Gate passed with CI run #${successfulRun.run_number}: ${successfulRun.html_url}`
            );

  test:
    needs: gate
    runs-on: ubuntu-latest
    name: "Test (Python ${{ matrix.python-version }})"
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check castor/

      - name: Check formatting
        run: ruff format --check castor/

      - name: Validate RCAN configs
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir .

      - name: Run tests with coverage
        run: pytest tests/ -q --cov=castor --cov-report=term-missing --cov-fail-under=30

  release:
    needs: test
    runs-on: ubuntu-latest
    name: "Create Release"
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync version across all touchpoints
        run: |
          python scripts/sync-version.py ${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "chore: sync version touchpoints to v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main || true

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag (or all if first release)
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "COMMITS<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: "OpenCastor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## OpenCastor v${{ steps.version.outputs.VERSION }}

            ### Commits
            ```
            ${{ steps.notes.outputs.COMMITS }}
            ```

            ### Install
            ```bash
            curl -sL opencastor.com/install | bash
            ```

            Or with pip:
            ```bash
            pip install opencastor==${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    name: "Publish to PyPI (OIDC)"
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install "cyclonedx-bom>=4,<5"
          cyclonedx-bom -e -o opencastor-${{ github.ref_name }}-sbom.cyclonedx.json
          echo "SBOM generated:"
          python3 -c "import json; d=json.load(open('opencastor-${{ github.ref_name }}-sbom.cyclonedx.json')); print(f'Components: {len(d.get(\"components\", []))}')"

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: opencastor-${{ github.ref_name }}-sbom.cyclonedx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sbom/ directory
        run: |
          mkdir -p sbom
          cp opencastor-${{ github.ref_name }}-sbom.cyclonedx.json sbom/opencastor-latest-sbom.cyclonedx.json
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add sbom/
          git diff --staged --quiet || git commit -m "chore(sbom): update SBOM for ${{ github.ref_name }}"
          git push origin HEAD:main || true

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        id: publish_oidc
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        continue-on-error: true
        with:
          skip-existing: true

      - name: Publish to PyPI (API token fallback)
        if: steps.publish_oidc.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish mode summary
        if: always()
        run: |
          if [ "${{ steps.publish_oidc.outcome }}" = "success" ]; then
            echo "### PyPI publish mode: Trusted Publisher (OIDC)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### PyPI publish mode: API token fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "OIDC trusted publishing failed for this run. Configure a matching trusted publisher at:" >> "$GITHUB_STEP_SUMMARY"
            echo "https://pypi.org/manage/project/opencastor/settings/publishing/?provider=github&owner=craigm26&repository=OpenCastor&workflow_filename=release.yml" >> "$GITHUB_STEP_SUMMARY"
          fi
