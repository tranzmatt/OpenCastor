name: Feature request
description: Propose a new feature or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement! Before filing, check the
        [ecosystem CONTRIBUTING doc](https://github.com/craigm26/opencastor-ops/blob/master/CONTRIBUTING.md)
        to make sure this is the right repo.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard today? Describe the user experience, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: How would you solve this? Sketches, pseudocode, API shapes all welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in scope for the first iteration? What's explicitly out of scope?
    validations:
      required: false
  - type: input
    id: related
    attributes:
      label: Related issues / PRs
      description: Cross-references in this or other ecosystem repos.
      placeholder: "e.g. RobotRegistryFoundation/robot-md#3"
    validations:
      required: false
