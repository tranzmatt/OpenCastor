rcan_version: '3.0'
metadata:
  robot_name: SunFounder_PiCar-X
  robot_uuid: 4a10cef1-a7b0-4e09-a3b5-fc37016edf11
  manufacturer: SunFounder
  model: PiCar-X
  author: OpenCastor Default
  license: Apache-2.0
  tags:
  - ackermann
  - stem
  - raspberry-pi
  - beginner
  description: 'SunFounder PiCar-X — a Raspberry Pi-based Ackermann-steering robot
    car for STEM learning. Features front-wheel servo steering, rear-wheel DC motor
    drive, servo-mounted Pi Camera for pan/tilt vision, and HC-SR04 ultrasonic sensor.
    Controlled via SunFounder''s picar-x Python library over GPIO/I2C.

    '
  rrn: RRN-421410179406
  rrn_uri: rrn://community/robot/opencastor/sunfounder-picar-x/sunfounder_picar_x
agent:
  provider: anthropic
  model: claude-sonnet-4-5
  vision_enabled: true
  latency_budget_ms: 120
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
physics:
  type: ackermann
  dof: 2
  chassis:
    wheelbase_mm: 141
    track_width_mm: 120
    wheel_radius_mm: 33
camera:
  type: picam
  resolution:
  - 640
  - 480
  framerate: 30
  depth_enabled: false
drivers:
- id: motor_driver
  protocol: gpio
  interface: i2c
  address: '0x14'
  left_motor_channel: 0
  right_motor_channel: 1
  max_speed: 100
- id: steering_servo
  protocol: gpio
  interface: i2c
  address: '0x14'
  sensor_type: servo
  channel: 0
  center_angle_deg: 0
  min_angle_deg: -30
  max_angle_deg: 30
- id: camera_pan_servo
  protocol: gpio
  interface: i2c
  address: '0x14'
  sensor_type: servo
  channel: 1
  center_angle_deg: 0
  min_angle_deg: -90
  max_angle_deg: 90
- id: camera_tilt_servo
  protocol: gpio
  interface: i2c
  address: '0x14'
  sensor_type: servo
  channel: 2
  center_angle_deg: 0
  min_angle_deg: -35
  max_angle_deg: 65
- id: ultrasonic_sensor
  protocol: gpio
  sensor_type: hcsr04
  trigger_gpio: 27
  echo_gpio: 22
  max_range_m: 4.0
- id: camera
  protocol: picam
  enabled: true
  url: http://localhost:8080/stream
connection:
  type: local
network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  - vision
  enable_mdns: true
  enable_jwt: false
safety:
  obstacle_stop_cm: 20
  estop_on_startup: false
  max_linear_speed_mps: 1.0
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
notes:
  setup: 'Install picar-x library: pip3 install picar-x Enable I2C on Pi: sudo raspi-config
    → Interfaces → I2C → Enable Run calibration: cd /opt/picar-x && python3 calibration.py
    Library docs: https://docs.sunfounder.com/projects/picar-x

    '
  hardware:
    compute: Raspberry Pi 4 or 3B+
    camera: Raspberry Pi Camera Module v2 (5MP)
    ultrasonic: HC-SR04 (4m range)
    battery: 7.4V Li-ion 2000mAh
    motor_hat: SunFounder Robot HAT (I2C, PCA9685)
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: anthropic
  slow_model: claude-sonnet-4-5
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: anthropic
  model: claude-sonnet-4-5
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
firmware_hash: null
attestation_ref: null
fria_ref: null
