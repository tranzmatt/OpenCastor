rcan_version: '3.0'
metadata:
  robot_name: Groq-Speed-Rover
  robot_uuid: 258ced62-3cfc-40a2-b057-dba0e2402bbe
  author: OpenCastor Default
  license: Apache-2.0
  description: 'High-speed rover preset using Groq''s ultra-low-latency cloud inference.
    Llama 3.3 70B with sub-100ms response times. Ideal for time-critical teleoperation
    and reactive obstacle avoidance. Requires: GROQ_API_KEY from console.groq.com
    (free tier available)

    '
  tags:
  - mobile
  - rover
  - groq
  - fast
  - llama
  rrn: RRN-749723540287
  rrn_uri: rrn://community/robot/opencastor/groq-speed-rover/groq_rover
agent:
  provider: groq
  model: llama-3.3-70b-versatile
  vision_enabled: true
  latency_budget_ms: 100
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
camera:
  type: usb
  fps: 30
drivers:
- id: wheels
  protocol: mock
  note: Replace with pca9685 or dynamixel for real motors
physics:
  type: differential
  dof: 2
safety:
  obstacle_stop_cm: 30
  estop_on_startup: false
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
network:
  telemetry_stream: true
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  enable_mdns: true
  enable_jwt: false
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: groq
  slow_model: llama-3.3-70b-versatile
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: groq
  model: llama-3.3-70b-versatile
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
firmware_hash: null
attestation_ref: null
_migration_warnings:
- "signing_alg not set \u2014 v2.2 recommends 'ml-dsa-65' (post-quantum). Leaving\
  \ implicit; operator should set 'signing_alg: ml-dsa-65' explicitly because v3.0\
  \ rejects Ed25519-only profiles at L2+."
- "fria_ref not set \u2014 v3.0 REQUIRES fria_ref for Annex III high-risk systems\
  \ (RCAN \xA722, \xA727). Run `castor fria generate` to produce a Fundamental Rights\
  \ Impact Assessment document, then set fria_ref to its URI. Without this, your node\
  \ will be rejected at registration under L2+ conformance."
fria_ref: null
