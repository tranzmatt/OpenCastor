rcan_version: '1.6'
metadata:
  robot_name: Waveshare_AlphaBot2
  robot_uuid: 50a7112c-7098-4920-9208-5a05311f70ef
  author: OpenCastor Default
  license: Apache-2.0
  manufacturer: Waveshare
  model: AlphaBot2-Pi
  tags:
  - mobile
  - differential_drive
  - raspberry_pi
  - gpio
  - tracked
  - tb6612
  - alphabot2
  - stem
  - waveshare
  description: 'Waveshare AlphaBot2 tracked differential-drive robot kit with Raspberry
    Pi on top. Uses TB6612 motor driver controlled via direct Pi GPIO (pigpio/RPi.GPIO).
    Equipped with infrared obstacle sensors, line-following sensors, ultrasonic HC-SR04,
    Pi Camera, buzzer, and LEDs.

    '
  rrn: RRN-063532708914
  rrn_uri: rrn://community/robot/opencastor/waveshare-alphabot2/waveshare_alpha
agent:
  provider: anthropic
  model: claude-sonnet-4-5
  vision_enabled: true
  latency_budget_ms: 150
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
physics:
  type: differential
  dof: 2
  chassis:
    wheel_base_mm: 86
    track_width_mm: 86
    wheel_radius_mm: 25
drivers:
- id: motor_driver
  protocol: gpio
  channels:
    ain1_gpio: 13
    ain2_gpio: 6
    pwma_gpio: 12
    bin1_gpio: 21
    bin2_gpio: 20
    pwmb_gpio: 26
    standby_gpio: 19
  pwm_freq_hz: 500
  pwm_range: 100
- id: ultrasonic_sensor
  protocol: gpio
  sensor_type: hcsr04
  trigger_gpio: 22
  echo_gpio: 27
- id: infrared_sensors
  protocol: gpio
  sensor_type: infrared_obstacle
  channels:
    ir_left_gpio: 12
    ir_right_gpio: 17
- id: line_sensors
  protocol: gpio
  sensor_type: line_follower
  channels:
    sensor_1_gpio: 25
    sensor_2_gpio: 8
    sensor_3_gpio: 7
    sensor_4_gpio: 1
    sensor_5_gpio: 0
- id: camera
  protocol: picamera
  sensor_type: picam
  resolution:
  - 640
  - 480
  framerate: 30
- id: buzzer
  protocol: gpio
  sensor_type: buzzer
  gpio: 4
connection:
  type: local
network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  - vision
  enable_mdns: true
  enable_jwt: false
safety:
  obstacle_stop_cm: 20
  estop_on_startup: false
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
notes:
  wiring: 'TB6612FNG wired to Raspberry Pi GPIO header. Power: VM pin to battery (5–15V),
    VCC to 5V, GND shared. Motor A = left track, Motor B = right track.

    '
  camera_setup: 'Enable Pi Camera via raspi-config → Interface Options → Camera. Install
    picamera2: sudo apt install python3-picamera2

    '
  gpio_library: 'Uses RPi.GPIO or pigpio for direct motor control. Install: sudo apt
    install python3-rpi.gpio pigpio alternative: sudo apt install pigpio python3-pigpio

    '
  hardware_reference: https://www.waveshare.com/alphabot2-pi.htm
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: anthropic
  slow_model: claude-sonnet-4-5
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: anthropic
  model: claude-sonnet-4-5
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
cameras:
  main:
    type: http
    url: http://127.0.0.1:8765/snapshot
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
