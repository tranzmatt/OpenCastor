rcan_version: '3.0'
metadata:
  robot_name: Unitree_Go2
  robot_uuid: f4fcf792-b8fd-4398-9e20-1f6cdca6ffaf
  manufacturer: Unitree Robotics
  model: Go2
  author: OpenCastor Default
  license: Apache-2.0
  tags:
  - quadruped
  - legged
  - research
  - outdoor
  - lidar
  description: 'Unitree Go2 — a dynamic quadruped research platform with 12-DOF legged
    locomotion, Hesai XT16 3D lidar, and stereo depth camera. Capable of traversing
    complex terrain indoors and outdoors. Controlled via Unitree SDK2 (Python/C++)
    over Ethernet or WiFi. Max speed ~3.7 m/s.

    '
  rrn: RRN-503513744940
  rrn_uri: rrn://community/robot/opencastor/unitree-go2/unitree_go2
agent:
  provider: anthropic
  model: claude-sonnet-4-5
  vision_enabled: true
  latency_budget_ms: 100
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
physics:
  type: legged
  dof: 12
camera:
  type: usb
  resolution:
  - 1280
  - 720
  framerate: 30
  depth_enabled: true
drivers:
- id: unitree_sdk2
  protocol: unitree_sdk2
  host: 192.168.123.161
  port: 8082
  api_version: '2.0'
  gait_modes:
  - trot
  - crawl
  - stair_climb
  - stand
- id: lidar_hesai_xt16
  protocol: unitree_sdk2
  sensor_type: lidar
  model: Hesai XT16
  host: 192.168.123.161
  point_cloud_topic: /utlidar/cloud
  scan_range_m: 120.0
  channel_count: 16
- id: depth_camera
  protocol: unitree_sdk2
  sensor_type: depth_camera
  model: Go2 Stereo Depth
  host: 192.168.123.161
  topics:
    rgb: /camera/image_raw
    depth: /camera/depth
- id: imu
  protocol: unitree_sdk2
  sensor_type: imu
  host: 192.168.123.161
connection:
  type: ethernet
  host: 192.168.123.161
  reconnect_interval_ms: 1000
  watchdog_timeout_ms: 500
network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  - vision
  enable_mdns: true
  enable_jwt: true
safety:
  obstacle_stop_cm: 40
  estop_on_startup: true
  max_linear_speed_mps: 3.7
  max_angular_speed_radps: 3.14
  hardware_watchdog_mcu: true
  physical_estop: true
  human_proximity_sensors: depth_camera
  sil_level: PLc
  voltage_monitoring: true
  payload_kg: 5.0
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
notes:
  setup: 'Install Unitree SDK2: pip install unitree_sdk2py Connect to Go2 WiFi hotspot
    (SSID: UnitreeGo2_XXXXXX) or Ethernet. Robot IP: 192.168.123.161 (default). Enable
    sports mode via the app before autonomous operation. Unitree Go2 EDU variant required
    for full SDK/API access.

    '
  hardware:
    compute: Unitree internal PC (Intel® RealSense™ Vision)
    lidar: Hesai XT16 (16-channel 3D, 120m range)
    battery: 5200mAh (approx 1-2h runtime)
    max_payload_kg: 5.0
  warning: 'High-power legged robot — clear the area before operation. Always engage
    e-stop when near people. Never operate at full speed (3.7 m/s) indoors.

    '
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: anthropic
  slow_model: claude-sonnet-4-5
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: anthropic
  model: claude-sonnet-4-5
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
firmware_hash: null
attestation_ref: null
fria_ref: null
