rcan_version: '3.0'
metadata:
  robot_name: VEX_IQ
  robot_uuid: d9425b40-7524-40f2-a4a4-b311e06fa1c2
  author: OpenCastor Default
  license: Apache-2.0
  tags:
  - mobile
  - educational
  - vex
  - vex-iq
  - stem
  - second-hand
  description: 'VEX IQ robotics system — one of the most donated platforms from school
    robotics programs. Smart motors and sensors share the same 4-pin RJ11-style ports
    and communicate over a proprietary VEX serial/I2C protocol. Brain connects via
    USB. Typical kit: 2 drive motors, 1 arm motor, distance + color + gyro sensors.

    '
  rrn: RRN-719372023557
  rrn_uri: rrn://community/robot/opencastor/vex-iq/vex_iq
agent:
  provider: anthropic
  model: claude-sonnet-4-5
  vision_enabled: false
  latency_budget_ms: 300
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
physics:
  type: differential
  dof: 2
  chassis:
    wheel_base_mm: 190
    wheel_radius_mm: 45
drivers:
- id: left_motor
  protocol: vex_iq_serial
  port: 1
  device_type: motor
  gearbox: high_speed
  reversed: false
- id: right_motor
  protocol: vex_iq_serial
  port: 6
  device_type: motor
  gearbox: high_speed
  reversed: true
- id: arm_motor
  protocol: vex_iq_serial
  port: 3
  device_type: motor
  gearbox: torque
  reversed: false
- id: distance_sensor
  protocol: vex_iq_serial
  port: 2
  device_type: distance
- id: color_sensor
  protocol: vex_iq_serial
  port: 4
  device_type: color
- id: gyro_sensor
  protocol: vex_iq_serial
  port: 5
  device_type: gyro
- id: bumper_switch
  protocol: vex_iq_serial
  port: 7
  device_type: bumper
connection:
  type: serial
  port: /dev/ttyACM0
  baud: 115200
network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  enable_mdns: false
  enable_jwt: false
notes:
  setup: "1. Install VEXcode IQ or use the community vex-serial Python library. 2.\
    \ Flash a \"pass-through serial\" program to the Brain that echoes OpenCastor\n\
    \   commands to the smart port bus.\n3. Connect Brain via USB-A to USB-A cable.\
    \ 4. castor run --config vex_iq.rcan.yaml\n"
  second_hand_tips: 'VEX IQ sets are donated by middle/high school robotics teams
    after seasons end. Check Facebook Marketplace, eBay, and school auction sites.
    Smart motors are self-identifying — plug them in and the Brain auto-detects. Battery
    packs are the most commonly dead component; replacements are ~$20.

    '
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: anthropic
  slow_model: claude-sonnet-4-5
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: anthropic
  model: claude-sonnet-4-5
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
cameras:
  main:
    type: http
    url: http://127.0.0.1:8765/snapshot
safety:
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
firmware_hash: null
attestation_ref: null
fria_ref: null
