rcan_version: '3.0'
metadata:
  robot_name: TurtleBot3_Burger
  robot_uuid: bc7bfa45-e015-4c1d-a371-f494bb180dea
  manufacturer: ROBOTIS
  model: TurtleBot3 Burger
  author: OpenCastor Default
  license: Apache-2.0
  tags:
  - ros2
  - turtlebot
  - educational
  - indoor
  - lidar
  description: 'TurtleBot3 Burger by ROBOTIS — the canonical entry-level ROS2 mobile
    robot. Differential drive on two wheels, Raspberry Pi 4 running ROS2, OpenCR MCU
    for motor/sensor control, LDS-01 360° lidar, and an IMU. Used worldwide in robotics
    courses and research labs.

    '
  rrn: RRN-095398009948
  rrn_uri: rrn://community/robot/opencastor/turtlebot3-burger/turtlebot3_burger
agent:
  provider: anthropic
  model: claude-sonnet-4-5
  vision_enabled: false
  latency_budget_ms: 150
  safety_stop: true
  offline_provider: ollama
  confidence_gates:
  - scope: control
    min_confidence: 0.75
    on_fail: block
  - scope: safety
    min_confidence: 0.9
    on_fail: block
physics:
  type: differential
  dof: 2
  chassis:
    wheel_base_mm: 160
    wheel_radius_mm: 33
drivers:
- id: opencr_ros2_bridge
  protocol: ros2_bridge
  topics:
    cmd_vel: /cmd_vel
    odom: /odom
    battery: /battery_state
- id: lidar_lds01
  protocol: ros2_bridge
  sensor_type: lidar
  model: LDS-01
  topics:
    scan: /scan
  scan_range_m: 3.5
  angular_resolution_deg: 1.0
- id: imu
  protocol: ros2_bridge
  sensor_type: imu
  topics:
    imu: /imu
ros2:
  enabled: true
  namespace: /tb3
  domain_id: 0
connection:
  type: local
network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - nav
  - teleop
  - chat
  enable_mdns: true
  enable_jwt: false
safety:
  obstacle_stop_cm: 20
  estop_on_startup: false
  max_linear_speed_mps: 0.22
  max_angular_speed_radps: 2.84
  local_safety_wins: true
  emergency_stop_distance: 0.4
  estop_bypass_rate_limit: true
  watchdog:
    timeout_s: 10
notes:
  setup: 'Requires ROS2 Humble or later on the Raspberry Pi 4. Flash OpenCR with the
    TurtleBot3 firmware from ROBOTIS. Source the ROS2 workspace before launching:
    source /opt/ros/humble/setup.bash Launch: ros2 launch turtlebot3_bringup robot.launch.py

    '
  hardware:
    compute: Raspberry Pi 4 (2GB+ recommended)
    mcu: OpenCR 1.0 (STM32F746)
    lidar: ROBOTIS LDS-01 (360° 2D, 3.5m range)
    battery: Li-Po 11.1V 1800mAh
tiered_brain:
  fast_provider: ollama
  fast_model: gemma3:1b
  slow_provider: anthropic
  slow_model: claude-sonnet-4-5
  planner_interval: 10
agent_roster:
- id: nav_specialist
  provider: ollama
  model: gemma3:4b
  scope: nav
- id: chat_specialist
  provider: anthropic
  model: claude-sonnet-4-5
  scope: chat
geofence:
  enabled: false
  boundary:
    type: none
reactive:
  min_obstacle_m: 0.3
  fallback_provider: ollama
cameras:
  main:
    type: http
    url: http://127.0.0.1:8765/snapshot
hardware_safety:
  physical_estop: false
  hardware_watchdog_mcu: false
p66:
  enabled: true
  loa_enforcement: true
  consent_required: true
  manifest:
    estop_qos_bypass: true
consent:
  required: true
  mode: explicit
  scope_threshold: control
security:
  replay_protection:
    enabled: true
    window_s: 30
  signing:
    enabled: false
    algorithm: Ed25519
loa:
  enforcement: true
  min_loa_for_control: 1
human_identity:
  loa_required: 1
transport:
  supported:
  - http
  - mqtt
  constrained_enabled: false
multimodal:
  enabled: true
  max_chunk_bytes: 1048576
offline:
  enabled: true
  fallback_provider: ollama
r2ram:
  scopes:
  - discover
  - status
  - chat
  - control
  - safety
federation:
  enabled: true
  consent_bridge: false
firmware_hash: null
attestation_ref: null
fria_ref: null
