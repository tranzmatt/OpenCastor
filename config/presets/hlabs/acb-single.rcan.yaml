rcan_version: '3.0'
metadata:
  robot_name: acb-single
  robot_uuid: 00000000-0000-0000-0000-000000000001
  author: HLaboratories
  license: Apache-2.0
  description: Single HLabs ACB v2.0 joint — USB-C serial, velocity control
  manufacturer: HLaboratories
  hardware_version: v2.0
  tags:
  - hlabs
  - acb
  - single-joint
  - bldc
agent:
  provider: google
  model: gemini-2.5-flash
  vision_enabled: false
  safety_stop: true
drivers:
- id: joint_0
  protocol: acb
  port: auto
  pole_pairs: 7
  control_mode: velocity
  max_velocity: 50.0
  pid:
    vel_p: 0.25
    vel_i: 1.0
    vel_d: 0.0
    pos_p: 20.0
    pos_i: 1.0
    pos_d: 0.0
    curr_p: 0.5
    curr_i: 0.1
    curr_d: 0.001
network:
  telemetry_stream: true
physics:
  type: serial_manipulator
  dof: 1
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - move
  - chat
  enable_mdns: true
  enable_jwt: false
firmware_hash: null
attestation_ref: null
fria_ref: null
