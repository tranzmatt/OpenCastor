rcan_version: '3.0'
metadata:
  robot_name: acb-arm-3dof
  robot_uuid: 00000000-0000-0000-0000-000000000002
  author: HLaboratories
  license: Apache-2.0
  description: 3-joint HLabs ACB v2.0 robot arm — shoulder/elbow CAN, wrist USB-C,
    position control
  manufacturer: HLaboratories
  hardware_version: v2.0
  tags:
  - hlabs
  - acb
  - arm
  - 3dof
  - bldc
  - can
agent:
  provider: google
  model: gemini-2.5-flash
  vision_enabled: true
  safety_stop: true
drivers:
- id: shoulder
  protocol: acb
  transport: can
  can_interface: socketcan
  can_channel: can0
  can_node_id: 1
  pole_pairs: 14
  control_mode: position
  max_velocity: 20.0
  pid:
    vel_p: 0.3
    vel_i: 1.2
    vel_d: 0.01
    pos_p: 30.0
    pos_i: 1.5
    pos_d: 0.1
    curr_p: 0.6
    curr_i: 0.15
    curr_d: 0.001
- id: elbow
  protocol: acb
  transport: can
  can_interface: socketcan
  can_channel: can0
  can_node_id: 2
  pole_pairs: 14
  control_mode: position
  max_velocity: 25.0
  pid:
    vel_p: 0.28
    vel_i: 1.1
    vel_d: 0.005
    pos_p: 25.0
    pos_i: 1.2
    pos_d: 0.08
    curr_p: 0.55
    curr_i: 0.12
    curr_d: 0.001
- id: wrist
  protocol: acb
  port: auto
  pole_pairs: 7
  control_mode: position
  max_velocity: 30.0
  pid:
    vel_p: 0.25
    vel_i: 1.0
    vel_d: 0.0
    pos_p: 20.0
    pos_i: 1.0
    pos_d: 0.0
    curr_p: 0.5
    curr_i: 0.1
    curr_d: 0.001
network:
  telemetry_stream: true
physics:
  type: serial_manipulator
  dof: 3
rcan_protocol:
  port: 8000
  capabilities:
  - status
  - arm
  - chat
  enable_mdns: true
  enable_jwt: false
firmware_hash: null
attestation_ref: null
fria_ref: null
