profile: lerobot/aloha
robot_type: arm_bimanual

# ALOHA bimanual teleoperation setup (Dynamixel XM430 / XM540 servos).
# 14-DOF: 7 joints per arm.
# Install: pip install opencastor[lerobot]

drivers:
  - id: left_arm
    protocol: dynamixel
    port: auto
    baud_rate: 1000000
    motor_ids: [1, 2, 3, 4, 5, 6, 7]
    joint_names:
      - left_waist
      - left_shoulder
      - left_elbow
      - left_forearm_roll
      - left_wrist_angle
      - left_wrist_rotate
      - left_gripper

  - id: right_arm
    protocol: dynamixel
    port: auto
    baud_rate: 1000000
    motor_ids: [8, 9, 10, 11, 12, 13, 14]
    joint_names:
      - right_waist
      - right_shoulder
      - right_elbow
      - right_forearm_roll
      - right_wrist_angle
      - right_wrist_rotate
      - right_gripper
