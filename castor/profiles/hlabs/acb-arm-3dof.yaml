# HLabs ACB v2.0 — 3-DOF arm (shoulder + elbow + wrist)
profile: hlabs/acb-arm-3dof
robot_type: arm

drivers:
  - id: shoulder
    protocol: acb
    transport: can
    can_interface: socketcan
    can_channel: can0
    can_node_id: 1
    pole_pairs: 7
    control_mode: position
    max_velocity: 30.0
    pid: {vel_p: 0.25, vel_i: 1.0, vel_d: 0.0, pos_p: 20.0, pos_i: 1.0, pos_d: 0.0, curr_p: 0.5, curr_i: 0.1, curr_d: 0.001}
  - id: elbow
    protocol: acb
    transport: can
    can_interface: socketcan
    can_channel: can0
    can_node_id: 2
    pole_pairs: 7
    control_mode: position
    max_velocity: 30.0
    pid: {vel_p: 0.25, vel_i: 1.0, vel_d: 0.0, pos_p: 20.0, pos_i: 1.0, pos_d: 0.0, curr_p: 0.5, curr_i: 0.1, curr_d: 0.001}
  - id: wrist
    protocol: acb
    transport: can
    can_interface: socketcan
    can_channel: can0
    can_node_id: 3
    pole_pairs: 7
    control_mode: position
    max_velocity: 20.0
    pid: {vel_p: 0.25, vel_i: 1.0, vel_d: 0.0, pos_p: 20.0, pos_i: 1.0, pos_d: 0.0, curr_p: 0.5, curr_i: 0.1, curr_d: 0.001}
