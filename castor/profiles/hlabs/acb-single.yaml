# HLabs ACB v2.0 — single actuator (Motor Test Mount)
profile: hlabs/acb-single
robot_type: actuator_test

drivers:
  - id: motor_0
    protocol: acb
    port: auto
    pole_pairs: 7
    control_mode: velocity
    max_velocity: 50.0
    pid:
      vel_p: 0.25
      vel_i: 1.0
      vel_d: 0.0
      pos_p: 20.0
      pos_i: 1.0
      pos_d: 0.0
      curr_p: 0.5
      curr_i: 0.1
      curr_d: 0.001
