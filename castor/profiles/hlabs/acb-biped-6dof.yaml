# HLabs ACB v2.0 — 6-DOF bipedal (2x hip + 2x knee + 2x ankle)
profile: hlabs/acb-biped-6dof
robot_type: bipedal

drivers:
  - id: hip_l
    protocol: acb
    transport: can
    can_interface: socketcan
    can_channel: can0
    can_node_id: 1
    pole_pairs: 7
    control_mode: position
    max_velocity: 25.0
    pid: {vel_p: 0.25, vel_i: 1.0, vel_d: 0.0, pos_p: 20.0, pos_i: 1.0, pos_d: 0.0, curr_p: 0.5, curr_i: 0.1, curr_d: 0.001}
